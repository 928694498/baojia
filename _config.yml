# GitHub Pages 配置文件
# 跨境物流管理系统

title: 跨境物流管理系统
description: 完整的跨境物流管理系统，提供产品查询、实时报价、销售管理功能
baseurl: "/baojia"  # 仓库名称
url: "https://928694498.github.io"  # GitHub Pages基础URL

# 构建设置
markdown: kramdown
permalink: pretty

# 主题设置
theme: jekyll-theme-cayman

# 插件
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO优化
seo:
  name: 跨境物流管理系统
  description: 企业级跨境物流解决方案
  author: 跨境物流团队
  twitter:
    username: logistics_system
  og:
    image: /assets/logo.png

# 自定义设置
custom:
  version: "1.0.0"
  last_updated: 2026-04-09
  github_repo: "928694498/baojia"
  github_url: "https://github.com/928694498/baojia"
  live_demo: "https://928694498.github.io/baojia"
  
# 排除文件
exclude:
  - "node_modules/"
  - "vendor/"
  - "*.log"
  - ".git/"
  - ".github/"
  - ".vscode/"
  - ".idea/"
  - "*.dockerfile"
  - "docker-compose.yml"
  - "*.md"  # 排除Markdown文件，由前端处理
  
# 包含文件
include:
  - "_headers"
  - "_redirects"
  - "CNAME"  # 自定义域名支持

# 默认设置
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      author: "跨境物流团队"
      tags: "跨境物流, 报价系统, 销售管理, 企业微信"