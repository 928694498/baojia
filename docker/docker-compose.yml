version: '3.8'

services:
  # MongoDB数据库
  mongodb:
    image: mongo:6
    container_name: logistics-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-logistics}
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: logistics-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: logistics-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-adminpass}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP端口
      - "15672:15672" # 管理界面端口
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 后端API服务
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: logistics-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_USER:-user}:${MONGO_PASSWORD:-password}@mongodb:27017/${MONGO_DATABASE:-logistics}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-adminpass}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key}
      API_RATE_LIMIT: ${API_RATE_LIMIT:-100}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
    volumes:
      - backend_logs:/app/logs
      - uploads:/app/uploads
    ports:
      - "3000:3000"
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端应用
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: logistics-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_WEBSOCKET_URL: ${VITE_WEBSOCKET_URL:-ws://localhost:3000}
      VITE_WECHAT_BOT_URL: ${VITE_WECHAT_BOT_URL:-http://localhost:3002}
    ports:
      - "3001:80"
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 企业微信机器人
  wechat-bot:
    build:
      context: ..
      dockerfile: docker/wechat-bot.Dockerfile
    container_name: logistics-wechat-bot
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3002
      WECHAT_CORP_ID: ${WECHAT_CORP_ID}
      WECHAT_AGENT_ID: ${WECHAT_AGENT_ID}
      WECHAT_SECRET: ${WECHAT_SECRET}
      WECHAT_TOKEN: ${WECHAT_TOKEN}
      WECHAT_ENCODING_AES_KEY: ${WECHAT_ENCODING_AES_KEY}
      WECHAT_CALLBACK_URL: ${WECHAT_CALLBACK_URL:-http://localhost:3002/callback}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      API_BASE_URL: http://backend:3000
    ports:
      - "3002:3002"
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 反向代理（可选）
  nginx-proxy:
    image: nginx:alpine
    container_name: logistics-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - wechat-bot
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - logistics-network

  # 监控面板（可选）
  monitor:
    image: grafana/grafana:latest
    container_name: logistics-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3003:3000"
    networks:
      - logistics-network

  # 日志收集（可选）
  loki:
    image: grafana/loki:latest
    container_name: logistics-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - logistics-network

  promtail:
    image: grafana/promtail:latest
    container_name: logistics-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - ./promtail/config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - logistics-network

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  backend_logs:
  uploads:
  grafana_data:

networks:
  logistics-network:
    driver: bridge
    name: logistics-network